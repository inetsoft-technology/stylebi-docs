name: Publish to GitHub Pages with Lunr Search Extension
on:
  push:
    branches: [main, v1.0]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  group: github-pages
  cancel-in-progress: false
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playbook  # All run: steps execute here
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Configure Pages
      uses: actions/configure-pages@v5
    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'
    - name: Install UI components
      working-directory: ui
      run: npm install
    - name: Create UI Bundle
      working-directory: ui
      run: npx gulp bundle
    - name: Install Antora with the Antora Lunr Extension
      run: npm i antora @antora/lunr-extension antora-router-extension
    - name: Generate Site
      env:
        SITE_URL: https://inetsoft-technology.github.io/stylebi-docs
      run: npx antora --ui-bundle-url ../ui/build/ui-bundle.zip antora-playbook.yml
    - name: Upload Artifacts
      uses: actions/upload-pages-artifact@v4
      with:
        path: playbook/build/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
